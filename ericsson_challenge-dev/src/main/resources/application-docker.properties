# ==========================================
# Profilo Docker - PostgreSQL
# ==========================================

# Database PostgreSQL
spring.datasource.url=jdbc:postgresql://${DB_HOST:postgres}:${DB_PORT:5432}/${DB_NAME:datathon_db}
spring.datasource.driverClassName=org.postgresql.Driver
spring.datasource.username=${DB_USERNAME:datathon_user}
spring.datasource.password=${DB_PASSWORD:datathon_pass}

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# H2 Console disabilitata in Docker
spring.h2.console.enabled=false

# Thymeleaf
spring.thymeleaf.cache=true

# Actuator
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=always
