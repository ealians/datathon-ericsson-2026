<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Login</title>
    <!-- Aggiungi Bootstrap CSS -->
    <link th:href="@{/webjars/bootstrap/5.3.3/css/bootstrap.min.css}" rel="stylesheet">
    <script>
        // Funzione per recuperare il valore di un cookie specifico
        function getCookie(name) {
            const value = `; ${document.cookie}`;
            const parts = value.split(`; ${name}=`);
            if (parts.length === 2) return parts.pop().split(';').shift();
        }

        // Controlla se esiste un authToken nei cookie e reindirizza a /profiles
        window.onload = function() {
            checkAuthToken();
            checkAdminExists();
        };

        function parseJwt(token) {
            try {
                const base64Url = token.split('.')[1];
                const base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
                const jsonPayload = decodeURIComponent(atob(base64).split('').map(c =>
                    '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2)
                ).join(''));
                return JSON.parse(jsonPayload);
            } catch (e) {
                console.error("Errore nella decodifica del token", e);
                return null;
            }
        }

        function checkAuthToken() {
            console.log("Verifica token in corso...");
            const token = getCookie("authToken");
            if (!token) {
                return;
            }

            const payload = parseJwt(token);
            const currentTime = Math.floor(Date.now() / 1000);
            if (!payload || payload.exp < currentTime) {
                setCookie("authToken", "", -1);
            }
        }

        // Funzione per impostare il cookie
        function setCookie(name, value, days) {
            let expires = "";
            if (days) {
                const date = new Date();
                date.setTime(date.getTime() + (days * 24 * 60 * 60 * 1000));
                expires = "; expires=" + date.toUTCString();
            }
            document.cookie = name + "=" + (value || "") + expires + "; path=/; SameSite=Lax";
        }

        async function login(event) {
            event.preventDefault();

            const email = document.getElementById("email").value;
            const password = document.getElementById("password").value;

            const response = await fetch("/api/auth/login", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({ email: email, password: password })
            });

            if (response.ok) {
                const data = await response.json();
                setCookie("authToken", data.token, 1); // Salva il token come cookie per 1 giorno
                localStorage.setItem("authToken", data.token);
                // Effettua il reindirizzamento alla pagina dei profili
                window.location.href = "/profiles";
            } else {
                alert("Login fallito, controlla le credenziali.");
            }
        }

        // Verifica esistenza admin al caricamento pagina
        async function checkAdminExists() {
            try {
                const response = await fetch("/api/auth/adminExists");
                if (response.ok) {
                    const exists = await response.json();
                    const btn = document.getElementById("createAdminBtn");
                    btn.style.display = exists ? "none" : "block";
                }
            } catch (e) {
                console.error("Errore verifica esistenza admin", e);
            }
        }

        async function createFirstAdmin() {
            const btn = document.getElementById("createAdminBtn");
            const feedbackDiv = document.getElementById("adminFeedback");
            btn.disabled = true;

            try {
                const response = await fetch("/api/auth/createFirstUser", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" }
                });

                if (response.ok) {
                    btn.style.display = "none";
                    feedbackDiv.innerHTML = '<div class="alert alert-success">Admin creato con successo! Credenziali: admin@elis.org / password</div>';
                    feedbackDiv.style.display = "block";
                } else {
                    const errorText = await response.text();
                    btn.disabled = false;
                    feedbackDiv.innerHTML = '<div class="alert alert-danger">Errore: ' + escapeHtml(errorText) + '</div>';
                    feedbackDiv.style.display = "block";
                }
            } catch (e) {
                btn.disabled = false;
                feedbackDiv.innerHTML = '<div class="alert alert-danger">Errore di rete.</div>';
                feedbackDiv.style.display = "block";
            }
        }

        function escapeHtml(text) {
            const div = document.createElement("div");
            div.textContent = text;
            return div.innerHTML;
        }
    </script>
</head>
<body class="bg-light d-flex align-items-center" style="height: 100vh;">
<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-4">
            <div class="card shadow-sm">
                <div class="card-body">
                    <h3 class="text-center mb-4">Login</h3>
                    <form onsubmit="login(event)">
                        <div class="mb-3">
                            <label for="email" class="form-label">Email</label>
                            <input type="email" id="email" name="email" class="form-control" placeholder="Inserisci email" required>
                        </div>
                        <div class="mb-3">
                            <label for="password" class="form-label">Password</label>
                            <input type="password" id="password" name="password" class="form-control" placeholder="Inserisci password" required>
                        </div>
                        <button type="submit" class="btn btn-primary w-100">Login</button>
                    </form>
                    <!-- Pulsante Creazione Admin (nascosto di default, visibile solo se nessun admin esiste) -->
                    <button type="button" id="createAdminBtn" class="btn btn-success w-100 mt-3"
                            style="display: none;" onclick="createFirstAdmin()">
                        Crea Primo Admin
                    </button>
                    <!-- Container Feedback Alert -->
                    <div id="adminFeedback" class="mt-3" style="display: none;"></div>
                </div>
            </div>
        </div>
    </div>
</div>
<!-- Aggiungi Bootstrap JS -->
<script th:src="@{/webjars/bootstrap/5.3.3/js/bootstrap.bundle.min.js}" defer></script>
</body>
</html>
