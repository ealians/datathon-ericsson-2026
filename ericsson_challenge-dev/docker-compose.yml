services:

  # ==========================================
  # PostgreSQL Database
  # ==========================================
  postgres:
    image: postgres:16-alpine
    container_name: datathon-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-datathon_db}
      POSTGRES_USER: ${DB_USERNAME:-datathon_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-datathon_pass}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-datathon_user} -d ${DB_NAME:-datathon_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ==========================================
  # Spring Boot Application
  # ==========================================
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: datathon-app
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8080}:8080"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-datathon_db}
      DB_USERNAME: ${DB_USERNAME:-datathon_user}
      DB_PASSWORD: ${DB_PASSWORD:-datathon_pass}
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
    driver: local
